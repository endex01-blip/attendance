<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance - Student Terminal</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary: #0A2342;    /* Deep Navy Blue */
            --accent: #D4AF37;     /* Classic Golden */
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text: #1E293B;
            --border: #E2E8F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
            border-top: 6px solid var(--primary);
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .header p {
            font-size: 0.9rem;
            color: #64748B;
        }

        .card-step {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            background: #FFF;
        }

        .step-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #475569;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #113665;
        }

        .btn-lock {
            background: #10B981;
        }
        .btn-lock:hover {
            background: #059669;
        }

        #profileDisplay {
            background: #F1F5F9;
            border-left: 4px solid var(--accent);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .switch-link {
            color: #EF4444;
            font-size: 0.8rem;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 6px;
            display: inline-block;
        }

        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border) !important;
            background: #000;
        }

        .status-box {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .status-neutral { background: #E2E8F0; color: #475569; }
        .status-success { background: #DCFCE7; color: #166534; border: 1px solid #BBF7D0; }
        .status-error { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📱 Location-Verified Check-In</h1>
        <p>Secure Student Verification Terminal</p>
    </div>

    <div id="profileDisplay" style="display: none;">
        <div>📌 Device Locked To: <strong id="boundName"></strong> (<span id="boundID"></span>)</div>
        <div class="switch-link" onclick="clearStudentProfile()">🔄 Not you? Click here to switch profiles</div>
    </div>

    <div id="step1Container" class="card-step">
        <div class="step-title">🔒 Step 1: Initialize Identity Profile</div>
        <div class="form-group">
            <label>ENTER LEGAL FULL NAME</label>
            <input type="text" id="studentName" placeholder="e.g., Abebe Kebede">
        </div>
        <div class="form-group">
            <label>ENTER ACADEMIC STUDENT ID NUMBER</label>
            <input type="text" id="studentID" placeholder="e.g., DDU/12345/16">
        </div>
        <button class="btn-lock" onclick="lockProfileToDevice()">🔒 Lock Profile to This Device</button>
    </div>

    <div id="step2Container" class="card-step" style="display: none;">
        <div class="step-title">📷 Step 2: Scan Room Session Token</div>
        <div id="reader"></div>
        <div id="scannerStatus" class="status-box status-neutral">⏳ System waiting for profile locking initialization...</div>
    </div>
</div>

<script>
    // =========================================================================
    // CONFIGURATION: PASTE YOUR RE-DEPLOYED GOOGLE APPS SCRIPT EXEC URL HERE
    // =========================================================================
    const SHEETS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbxJ27zkWOZ-4cBtTbls41xhXifjWHfJbjCxcCPI4p6JB8hWn1Um6i-PsWGbkJPNzwGX/exec';

    let html5QrcodeScanner = null;

    // SELF-EXECUTING CRYPTOGRAPHIC DEVICE FINGERPRINT SEED
    (function initializeDeviceFingerprint() {
        if (!localStorage.getItem('sys_device_token')) {
            const array = new Uint32Array(4);
            window.crypto.getRandomValues(array);
            const token = 'DEV-' + Array.from(array, dec => dec.toString(16).padStart(8, '0')).join('-');
            localStorage.setItem('sys_device_token', token);
        }
    })();

    // RUN WINDOW STATE ENGINE ON INGESTION
    window.onload = function() {
        evaluateProfileState();
    };

    function evaluateProfileState() {
        const savedID = localStorage.getItem('stud_profile_id');
        const savedName = localStorage.getItem('stud_profile_name');

        if (savedID && savedName) {
            // Adjust panel views
            document.getElementById('step1Container').style.display = 'none';
            document.getElementById('profileDisplay').style.display = 'block';
            document.getElementById('step2Container').style.display = 'block';
            
            document.getElementById('boundName').innerText = savedName;
            document.getElementById('boundID').innerText = savedID;
            document.getElementById('scannerStatus').className = "status-box status-neutral";
            document.getElementById('scannerStatus').innerText = "📷 Lens sensor ready. Point camera at Lecture Board QR.";
            
            startScannerEngine();
        } else {
            // Profile fallback reset
            document.getElementById('step1Container').style.display = 'block';
            document.getElementById('profileDisplay').style.display = 'none';
            document.getElementById('step2Container').style.display = 'none';
            stopScannerEngine();
        }
    }

    function lockProfileToDevice() {
        const nameVal = document.getElementById('studentName').value.trim();
        const idVal = document.getElementById('studentID').value.trim();

        if (!nameVal || !idVal) {
            alert("🔒 Access Denied: Both Legal Name and Academic ID profiles must be populated.");
            return;
        }

        localStorage.setItem('stud_profile_id', idVal);
        localStorage.setItem('stud_profile_name', nameVal);
        evaluateProfileState();
    }

    function clearStudentProfile() {
        if (confirm("⚠️ Log out profile configuration? This device signature will reject cross-logins under other accounts today.")) {
            localStorage.removeItem('stud_profile_id');
            localStorage.removeItem('stud_profile_name');
            evaluateProfileState();
        }
    }

    // INTERFACE CAPTURE PLATFORM (HTML5-QRCODE)
    function startScannerEngine() {
        if (html5QrcodeScanner) return;

        html5QrcodeScanner = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            config,
            onQrScanSuccess
        ).catch(err => {
            document.getElementById('scannerStatus').className = "status-box status-error";
            document.getElementById('scannerStatus').innerText = "❌ Camera Error: Permissions blocked or sandbox collision.";
            console.error(err);
        });
    }

    function stopScannerEngine() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner = null;
            }).catch(err => console.error(err));
        }
    }

    // ON SUCCESSFUL DECODE HANDLER
    function onQrScanSuccess(decodedText) {
        try {
            // Parse targeted operational JSON token from QR code
            const sessionData = JSON.parse(decodedText);
            
            if (!sessionData.id || !sessionData.lat || !sessionData.lng) {
                throw new Error("Invalid Session Token Layout Matrix.");
            }

            // Pause scanning state during background verification pipeline
            stopScannerEngine();
            updateStatusDisplay("status-neutral", "🛰️ Verifying structural GPS telemetry with instructor base...");

            // Fetch high-accuracy mobile satellite profile coordinates
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    processValidationMatrix(pos.coords.latitude, pos.coords.longitude, sessionData);
                },
                (err) => {
                    updateStatusDisplay("status-error", "❌ Telemetry Acquisition Failure: Location denied or indoor satellite obstruction.");
                    setTimeout(startScannerEngine, 4000);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );

        } catch (e) {
            updateStatusDisplay("status-error", "⚠️ Foreign QR Detected. Scan valid classroom session token.");
        }
    }

    // HAVERSINE FIELD RADIUS GEOMETRY METRIC CALCULATOR
    function calculateHaversineDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000; // Radius of Earth in meters
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c; 
    }

    function processValidationMatrix(studentLat, studentLng, sessionData) {
    const distance = calculateHaversineDistance(studentLat, studentLng, sessionData.lat, sessionData.lng);
    const maxRadius = sessionData.radius || 50;

    if (distance > maxRadius) {
        updateStatusDisplay("status-error", `🔒 Geofence Exception: Boundary error. You are ${distance.toFixed(1)}m from class.`);
        setTimeout(startScannerEngine, 5000);
        return;
    }

    // Build URL parameter string for seamless GET verification
    const studentId = encodeURIComponent(localStorage.getItem('stud_profile_id'));
    const studentName = encodeURIComponent(localStorage.getItem('stud_profile_name'));
    const className = encodeURIComponent(sessionData.class);
    const sessionId = encodeURIComponent(sessionData.id);
    const deviceToken = encodeURIComponent(localStorage.getItem('sys_device_token'));
    const distStr = encodeURIComponent(distance.toFixed(1));

    updateStatusDisplay("status-neutral", "🚀 Testing device signature security keys...");

    // Transmit data stream using transparent CORS-compliant GET parameters
    fetch(`${SHEETS_WEBHOOK_URL}?action=checkin&studentId=${studentId}&student=${studentName}&class=${className}&session=${sessionId}&deviceId=${deviceToken}&distance_m=${distStr}`)
    .then(res => res.json())
    .then(response => {
        if (response.status === 'error') {
            // Displays the anti-fraud error modal right on the student screen
            updateStatusDisplay("status-error", response.message);
            alert(response.message); 
        } else {
            updateStatusDisplay("status-success", "✅ Verification Approved! Attendance locked to spreadsheet.");
        }
    })
    .catch(err => {
        updateStatusDisplay("status-error", "❌ Connection Interrupted. Verification terminal failed.");
        setTimeout(startScannerEngine, 4000);
    });
}
    function updateStatusDisplay(className, text) {
        const box = document.getElementById('scannerStatus');
        box.className = "status-box " + className;
        box.innerText = text;
    }
</script>

</body>
</html>
